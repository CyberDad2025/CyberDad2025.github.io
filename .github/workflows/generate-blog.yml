name: CyberDad Daily Post

on:
  schedule:
    - cron: '0 14 * * *'   # Runs once daily at 9 AM EST (14:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions tab

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run post generator
        run: python main.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CyberDad Bot"
          git add _posts/ logs/
          if git diff --staged --quiet; then
            echo "Nothing new to commit — post already exists for today."
          else
            git commit -m "Daily post $(date +'%Y-%m-%d')"
            git push
          fi
